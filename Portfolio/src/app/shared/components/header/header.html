<header class="header">
  <div class="header__inner">
    <div class="header__logo-container">
      <div class="header__logo-icon">M</div>
      <div class="header__logo-text">
        <span>Lukas</span>
        <span>Müller</span>
      </div>
    </div>

    <div class="header__right">
      <button class="header__lang-toggle" (click)="toggleVisualLang()">
        <span class="header__lang-text" [class.header__lang-text--active]="visualLang === 'EN'">EN</span>
        <span class="header__lang-text" [class.header__lang-text--active]="visualLang === 'DE'">DE</span>
      </button>
      
      <nav class="header__nav">
        <a href="#about" class="header__nav-link" routerLink="" routerLinkActive="active">About me</a>
        <a href="#skills" class="header__nav-link" routerLink="" routerLinkActive="active">Skills</a>
        <a href="#projects" class="header__nav-link" routerLink="" routerLinkActive="active">Projects</a>
      </nav>
    </div>

    <button class="header__burger" (click)="toggleMenu()">
      <span class="line line-1" [class.open]="isMenuOpen()"></span>
      <span class="line line-2" [class.open]="isMenuOpen()"></span>
      <span class="line line-3" [class.open]="isMenuOpen()"></span>
    </button>
  </div>

  <div class="header__mobile-overlay" [class.open]="isMenuOpen()">
    <nav class="header__mobile-nav">
      <a href="#about" class="header__mobile-link" (click)="toggleMenu()" routerLink="" routerLinkActive="active">About me</a>
      <a href="#skills" class="header__mobile-link" (click)="toggleMenu()" routerLink="legal_notice" routerLinkActive="active">Skills</a>
      <a href="#projects" class="header__mobile-link" (click)="toggleMenu()" routerLink="" routerLinkActive="active">Projects</a>
    </nav>
    
    <button class="header__lang-toggle header__lang-toggle--mobile" (click)="toggleVisualLang()">
      <span class="header__lang-text" [class.header__lang-text--active]="visualLang === 'EN'">EN</span>
      <span class="header__lang-text" [class.header__lang-text--active]="visualLang === 'DE'">DE</span>
    </button>
  </div>
</header>
